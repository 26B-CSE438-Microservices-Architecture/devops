version: "3.9"

networks:
  ms-net:
    driver: bridge

volumes:
  redis-data:
  rabbitmq-data:
  kafka-data:
  postgres-gateway-data:
  postgres-user-data:
  postgres-order-data:
  postgres-restaurant-data:
  postgres-payment-data:

services:

  # ═══════════════════════════════════════════
  # ALTYAPI
  # ═══════════════════════════════════════════

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ms-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ms-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ms-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - ms-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════
  # VERİTABANLARI
  # ═══════════════════════════════════════════

  postgres-gateway:
    image: postgres:16-alpine
    container_name: postgres-gateway
    restart: unless-stopped
    environment:
      POSTGRES_DB: gatewaydb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-gateway-data:/var/lib/postgresql/data
    networks:
      - ms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gatewaydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - ms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order
    restart: unless-stopped
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    networks:
      - ms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d orderdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-restaurant:
    image: postgis/postgis:16-3.4
    container_name: postgres-restaurant
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurantdb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - postgres-restaurant-data:/var/lib/postgresql/data
    networks:
      - ms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d restaurantdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment
    restart: unless-stopped
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    networks:
      - ms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════
  # UYGULAMA SERVİSLERİ
  # ═══════════════════════════════════════════

  user-service:
    image: ghcr.io/${GITHUB_ORG}/user-service:latest
    container_name: user-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-user:5432/userdb
    ports:
      - "8000:8000"
    depends_on:
      postgres-user:
        condition: service_healthy
    networks:
      - ms-net

  order-service:
    image: ghcr.io/${GITHUB_ORG}/order-service:latest
    container_name: order-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/orderdb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RESTAURANT_SERVICE_URL: http://restaurant-service:5001
      PAYMENT_SERVICE_URL: http://payment-service:3000
      JWT_SECRET: ${JWT_SECRET}
      PAYMENT_TIMEOUT_MINUTES: 10
      RESTAURANT_TIMEOUT_MINUTES: 5
    ports:
      - "8082:8082"
    depends_on:
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ms-net

  restaurant-service:
    image: ghcr.io/${GITHUB_ORG}/restaurant-service:latest
    container_name: restaurant-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Host=postgres-restaurant;Port=5432;Database=restaurantdb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5001:5000"
    depends_on:
      postgres-restaurant:
        condition: service_healthy
    networks:
      - ms-net

  payment-service:
    image: ghcr.io/${GITHUB_ORG}/payment-service:latest
    container_name: payment-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-payment:5432/paymentdb
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      PAYMENT_PROVIDER: mock
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ms-net

  payment-worker:
    image: ghcr.io/${GITHUB_ORG}/payment-service:latest
    container_name: payment-worker
    restart: unless-stopped
    command: node src/worker/index.js
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-payment:5432/paymentdb
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      PAYMENT_PROVIDER: mock
    depends_on:
      - payment-service
    networks:
      - ms-net

  gateway:
    image: ghcr.io/${GITHUB_ORG}/gateway:latest
    container_name: gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Host=postgres-gateway;Port=5432;Database=gatewaydb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: TrendyolGo.Auth
      JwtSettings__Audience: TrendyolGo.Clients
      Services__UserService: http://user-service:8000
      Services__OrderService: http://order-service:8082
      Services__RestaurantService: http://restaurant-service:5001
      Services__PaymentService: http://payment-service:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres-gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      order-service:
        condition: service_started
      restaurant-service:
        condition: service_started
      payment-service:
        condition: service_started
    networks:
      - ms-net

